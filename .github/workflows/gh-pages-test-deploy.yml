---
name: GitHub Pages test deployment

on:
  pull_request:
    branches: [main]

jobs:
  test-deploy:
    name: GitHub Pages test deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test build
        run: |
          npm ci
          npm run build
